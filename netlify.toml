[build]
  # See scripts/netlify-build.sh for the full pipeline:
  #   1. map SUPABASE_URL → EXPO_PUBLIC_SUPABASE_URL if needed
  #   2. echo presence + length to the deploy log
  #   3. npm install + expo export
  command = "bash ./scripts/netlify-build.sh"
  publish = "dist"

# Required env vars (set in Netlify Site config → Environment variables).
# Either naming convention works — the script above maps short → prefixed:
#   SUPABASE_URL                   = https://<project>.supabase.co
#   SUPABASE_ANON_KEY              = <anon public JWT>
#   ─ OR equivalently ─
#   EXPO_PUBLIC_SUPABASE_URL
#   EXPO_PUBLIC_SUPABASE_ANON_KEY
#
# IMPORTANT: this section does NOT strip or filter any env vars. Netlify
# passes everything from "Environment variables" in Site config straight
# through to the build process. We only ADD the mappings above.

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# Serverless function: emails the founder on new waitlist signups
# (triggered by a Supabase Database Webhook -> Resend).
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SPA fallback — any unknown path renders the app shell so
# expo-router can take over and resolve client-side.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/_expo/static/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_expo/static/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
